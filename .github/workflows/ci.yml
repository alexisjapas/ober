# Continuous integration — every push to main and every PR must keep the four
# gates green (CONSTITUTION-DEV Rules 2, 3): formatting, clippy at zero
# warnings, tests on the three shipped platforms, and the Bevy boundary.
# `--locked` everywhere: CI builds exactly what Cargo.lock records — a drifted
# lockfile fails loudly instead of resolving silently.
name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all --check

  clippy:
    name: clippy (-D warnings)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: System dependencies
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends libasound2-dev libudev-dev libwayland-dev libxkbcommon-dev pkg-config
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --locked --workspace --all-targets -- -D warnings

  test:
    name: tests (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
      - name: System dependencies (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends libasound2-dev libudev-dev libwayland-dev libxkbcommon-dev pkg-config
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --locked --workspace

  # The real-time guard rails (Rule 1) are compile-checked: the `rt-checks`
  # feature wires assert_no_alloc into the audio callback. It only bites at
  # runtime in debug, but a build failure here means the feature gate rotted.
  rt-checks:
    name: rt-checks feature (specs §2.2)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: System dependencies
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends libasound2-dev pkg-config
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo check --locked -p engine --features rt-checks

  # No hardware test in CI: the manual controller checklist lives in TESTING.md
  # (Rule 8).
  bevy-boundary:
    name: Bevy boundary (specs §1.4)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - run: bash scripts/check-bevy-boundary.sh
